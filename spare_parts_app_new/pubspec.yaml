name: spare_parts_app
description: Spare Parts Management System
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.6.0

  # Local Storage
  shared_preferences: ^2.5.3
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0

  # State Management
  provider: ^6.1.5

  # WebSocket
  stomp_dart_client: ^3.0.1

  # UI
  font_awesome_flutter: ^10.9.1
  flutter_svg: ^2.2.3
  animate_do: ^4.2.0

  # Scanner
  mobile_scanner: ^7.2.0

  # Files
  file_picker: ^10.3.10
  open_file: ^3.5.11

  # Excel
  excel: ^4.0.5

  # PDF
  pdf: ^3.11.3
  printing: ^5.13.3

  # Images
  image_picker: ^1.1.2

  # Location
  geolocator: ^14.0.2
  geocoding: ^3.0.0

  # URL Launcher
  url_launcher: ^6.3.2

  # Voice Recognition
  speech_to_text: ^7.3.0

  # AI OCR
  google_mlkit_text_recognition: ^0.15.1

  # Search suggestions
  flutter_typeahead: ^5.2.0

  # Email (OTP)
  mailer: ^7.1.0

  # Google Login
  google_sign_in: ^6.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Translation
  translator: ^1.0.4+1

  # Date formatting
  intl: ^0.20.2

  # Notifications
  flutter_local_notifications: ^17.2.3
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.10
  firebase_auth: ^5.4.1

  # Password hashing
  bcrypt: ^1.1.3


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1


# -------------------------
# APP ICON CONFIGURATION
# -------------------------

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21


# -------------------------
# SPLASH SCREEN
# -------------------------

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo.png"

  android: true
  ios: true
  web: true
  fullscreen: true

  android_12:
    image: "assets/images/logo.png"
    icon_background_color: "#FFFFFF"


# -------------------------
# FLUTTER CONFIG
# -------------------------

flutter:
  uses-material-design: true

  assets:
    - assets/images/